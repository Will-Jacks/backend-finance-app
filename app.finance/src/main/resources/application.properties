spring.application.name=app.finance
# Configurań§es de conexŃo com o banco de dados MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/financeapp
spring.datasource.username=root
spring.datasource.password=root

# Configurań§es do dialeto MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configurań§es do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
